name: Teched Studios WhatsApp Bot Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Run every 5 hours to bypass GitHub Action's 6-hour timeout
    # This restarts the bot, but Firebase and Baileys session handle the resume gracefully.
    - cron: '0 */5 * * *' 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        working-directory: ./bot-engine
        run: npm install

      - name: Create Firebase Key File
        run: |
          cat << 'EOF' > teched-wa-bot-firebase-adminsdk-fbsvc-bf6468b556.json
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT || secrets.FIREBASE_KEY }}
          EOF

      - name: Run WhatsApp Bot
        working-directory: ./bot-engine
        run: node index.js
